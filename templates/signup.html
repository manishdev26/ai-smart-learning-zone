{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block body %}
<div class="auth-wrapper" style="align-items:flex-start;padding-top:2rem;padding-bottom:2rem;">
  <div class="auth-card fade-in" style="max-width:520px;">
    <div class="text-center mb-4">
      <a href="{{ url_for('index') }}" style="text-decoration:none;">
        <span style="font-size:2rem;">🧠</span>
        <div class="navbar-brand" style="font-size:1.5rem;display:block;margin-top:0.3rem;">SmartLearn</div>
      </a>
    </div>
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-sub">Start your personalized AI learning journey today</p>
    <form method="POST" action="{{ url_for('signup') }}">
      <div class="row g-3">
        <div class="col-12">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-user me-1"></i> Full Name</label>
            <input type="text" name="name" class="form-control-custom" placeholder="Your full name" required>
          </div>
        </div>
        <div class="col-12">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-envelope me-1"></i> Email Address</label>
            <input type="email" name="email" class="form-control-custom" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="col-12">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
            <input type="password" name="password" class="form-control-custom" placeholder="Choose a strong password" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-graduation-cap me-1"></i> Education Level</label>
            <select name="education" class="form-control-custom">
              <option value="High School">High School</option>
              <option value="Undergraduate" selected>Undergraduate</option>
              <option value="Postgraduate">Postgraduate</option>
              <option value="Professional">Professional</option>
            </select>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-chart-bar me-1"></i> Skill Level</label>
            <select name="skill_level" class="form-control-custom">
              <option value="Beginner" selected>Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>
        </div>
        <div class="col-12">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-tags me-1"></i> Interests <span style="opacity:0.6">(comma separated)</span></label>
            <input type="text" name="interests" class="form-control-custom" placeholder="e.g. Python, AI, Web Development">
          </div>
        </div>
      </div>
      <button type="submit" class="btn-primary-custom w-100 text-center mt-3" style="width:100%;border-radius:10px;padding:0.85rem;">
        <i class="fas fa-user-plus me-2"></i>Create Account
      </button>
    </form>
    <hr class="divider">
    <p class="text-center" style="color:var(--text-secondary);font-size:0.88rem;">
      Already have an account? <a href="{{ url_for('login') }}" style="color:var(--primary-light);font-weight:600;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
