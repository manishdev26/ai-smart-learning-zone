{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block body %}
<div class="auth-wrapper">
  <div class="auth-card fade-in">
    <div class="text-center mb-4">
      <a href="{{ url_for('index') }}" style="text-decoration:none;">
        <span style="font-size:2rem;">🧠</span>
        <div class="navbar-brand" style="font-size:1.5rem;display:block;margin-top:0.3rem;">SmartLearn</div>
      </a>
    </div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Sign in to continue your learning journey</p>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope me-1"></i> Email Address</label>
        <input type="email" name="email" class="form-control-custom" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
        <input type="password" name="password" class="form-control-custom" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-primary-custom w-100 text-center mt-2" style="width:100%;border-radius:10px;padding:0.8rem;">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>
    <hr class="divider">
    <p class="text-center" style="color:var(--text-secondary);font-size:0.88rem;">
      Don't have an account? <a href="{{ url_for('signup') }}" style="color:var(--primary-light);font-weight:600;">Create one free</a>
    </p>
    <div style="margin-top:1rem;padding:0.8rem;border-radius:10px;background:rgba(108,99,255,0.08);border:1px solid var(--border);font-size:0.78rem;color:var(--text-secondary)">
      <strong style="color:var(--primary-light)">Admin demo:</strong> admin@smartlearn.com / admin123
    </div>
  </div>
</div>
{% endblock %}
